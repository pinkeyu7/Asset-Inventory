<style>
  :root {
    --bg: #f5f6f8; --card: #ffffff; --text: #1b1f27; --muted: #6b7280;
    --border: #e6e8ec; --accent: #2f6df6; --asset: #2f6df6; --liab: #e0533d;
    --net: #17a673; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1218; --card: #171b23; --text: #e8eaed; --muted: #9aa0aa;
      --border: #262b35; --accent: #5b8dff; --asset: #5b8dff; --liab: #ff7a63;
      --net: #35d29b; --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 20px 16px 60px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  h1 { font-size: 20px; margin: 0; font-weight: 700; }
  .sub { color: var(--muted); font-size: 12px; }
  .upload { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .upload-btn {
    border: 1px solid var(--accent); background: var(--accent); color: #fff;
    padding: 8px 14px; border-radius: 999px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .upload-btn:hover { opacity: .9; }
  .upload-btn:disabled { opacity: .5; cursor: default; }
  .upload-status { font-size: 12px; color: var(--muted); }

  .tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .tab {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 600;
    transition: all .15s;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
  .kpi .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .kpi .value { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
  .kpi .unit { font-size: 13px; color: var(--muted); font-weight: 600; margin-left: 3px; }
  .kpi .delta { font-size: 12px; margin-top: 5px; font-weight: 600; }
  .up { color: var(--net); } .down { color: var(--liab); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .card h2 { font-size: 15px; margin: 0 0 4px; }
  .card .hint { color: var(--muted); font-size: 12px; margin: 0 0 12px; }
  .chart { width: 100%; height: 380px; }
  .chart.tall { height: 420px; }

  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .controls label { font-size: 13px; color: var(--muted); }
  input[type=range] { flex: 1; min-width: 180px; accent-color: var(--accent); }
  .month-badge { font-weight: 700; font-variant-numeric: tabular-nums; min-width: 66px; }
  select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px; font-size: 13px; font-variant-numeric: tabular-nums;
  }
  .presets { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
  .preset, .gran {
    border: 1px solid var(--border); background: var(--card); color: var(--muted);
    padding: 5px 11px; border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .preset:hover, .gran:hover { color: var(--text); border-color: var(--accent); }
  .preset.active, .gran.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .seg { display: inline-flex; gap: 4px; padding-right: 6px; border-right: 1px solid var(--border); margin-right: 4px; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: 8px; }
  .legend span::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
  .lg-asset::before { background: var(--asset); } .lg-liab::before { background: var(--liab); } .lg-net::before { background: var(--net); }
  .lg-delta::before { background: linear-gradient(90deg, var(--net) 50%, var(--liab) 50%); }

  .hidden { display: none; }
  .loading { text-align: center; color: var(--muted); padding: 60px 0; }
  .err { color: var(--liab); background: var(--card); border: 1px solid var(--liab); border-radius: 12px; padding: 16px; }
  .note { color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child { text-align: left; }
  thead th { color: var(--muted); font-weight: 600; }
  .spin { display:inline-block; width:22px; height:22px; border:3px solid var(--border); border-top-color: var(--accent); border-radius:50%; animation: r 1s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }
</style>
