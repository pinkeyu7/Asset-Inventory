<script>
// ============================================================
// Model —— 領域資料與純計算（不碰 DOM、不碰圖表）
//   持有伺服器回傳的 dashboard 資料，並提供各種查詢/衍生計算。
// ============================================================
window.App = window.App || {};
App.Model = (function () {
  var D = null;   // getDashboardData() 回傳的資料

  function load(data) { D = data; }
  function isEmpty() { return !D || !D.months || !D.months.length; }

  function months() { return D.months; }
  function monthCount() { return D.months.length; }
  function txnCount() { return D.txnCount; }
  function generatedAt() { return D.generatedAt; }
  function firstMonth() { return D.months[0]; }
  function lastMonth() { return D.months[D.months.length - 1]; }
  function yearly() { return D.yearly; }

  // 某年各月收支：回傳 [{month:'YYYY-MM', mm:'01', income, expense, net}]（依月份升冪）
  function monthlyByYear(year) {
    var pts = [];
    for (var i = 0; i < D.months.length; i++) {
      if (D.months[i].split('-')[0] === String(year)) {
        var f = (D.monthly && D.monthly[i]) || { income: 0, expense: 0, net: 0 };
        pts.push({ month: D.months[i], mm: D.months[i].split('-')[1], income: f.income, expense: f.expense, net: f.net });
      }
    }
    return pts;
  }

  function shortName(full) {
    return (D.accountMeta[full] && D.accountMeta[full].short) || full.replace(/^[A-Z]-/, '');
  }

  // 今天的年月在 months 中的索引（含未來紀錄時以「現在」為終點往前推）
  function nowIndex() {
    var d = new Date(), mm = d.getMonth() + 1;
    var ym = d.getFullYear() + '-' + (mm < 10 ? '0' + mm : '' + mm);
    var idx = D.months.indexOf(ym);
    if (idx >= 0) return idx;
    var first = D.months[0].split('-');
    var base = parseInt(first[0], 10) * 12 + (parseInt(first[1], 10) - 1);
    var target = d.getFullYear() * 12 + (mm - 1);
    return Math.max(0, Math.min(D.months.length - 1, target - base));
  }
  // 資料中出現過的年份（已排序）
  function distinctYears() {
    var ys = [], seen = {};
    D.months.forEach(function (m) { var y = m.split('-')[0]; if (!seen[y]) { seen[y] = 1; ys.push(y); } });
    return ys;
  }
  // 今年（夾在資料年份範圍內）
  function nowYear() {
    var ys = distinctYears(), y = new Date().getFullYear();
    return Math.max(parseInt(ys[0], 10), Math.min(parseInt(ys[ys.length - 1], 10), y));
  }

  // KPI：最新淨值/資產/負債 + 年增（對 12 個月前）
  function kpis() {
    var t = D.totals, last = t[t.length - 1];
    var prev = t[Math.max(0, t.length - 13)];
    var yoy = last.networth - prev.networth;
    var yoyPct = prev.networth ? (yoy / Math.abs(prev.networth) * 100) : 0;
    return {
      networth: last.networth, assets: last.assets, liabilities: last.liabilities,
      yoy: yoy, yoyPct: yoyPct, asOf: lastMonth()
    };
  }

  // 趨勢序列：依顆粒度與起迄回傳 {xLabel, points:[{label,assets,liab,net,delta}]}
  //   delta = 本期期末淨值 − 上期期末淨值（會參照範圍外的實際上一期，首點才不失真）
  function trendSeries(gran, startVal, endVal) {
    var pts = [], xLabel;
    if (gran === 'year') {
      var sy = parseInt(startVal, 10), ey = parseInt(endVal, 10);
      if (isNaN(sy)) sy = -Infinity;
      if (isNaN(ey)) ey = Infinity;
      if (sy > ey) { var s = sy; sy = ey; ey = s; }
      xLabel = '年度';
      var yearEndAll = {};   // 各年年末索引（含範圍外）
      for (var i = 0; i < D.months.length; i++) { yearEndAll[parseInt(D.months[i].split('-')[0], 10)] = i; }
      var allYears = Object.keys(yearEndAll).map(Number).sort(function (a, b) { return a - b; });
      allYears.forEach(function (yy, pos) {
        if (yy < sy || yy > ey) return;
        var t = D.totals[yearEndAll[yy]];
        var delta = (pos > 0) ? Math.round(t.networth - D.totals[yearEndAll[allYears[pos - 1]]].networth) : null;
        pts.push({ label: String(yy), assets: t.assets, liab: t.liabilities, net: t.networth, delta: delta });
      });
    } else {
      var start = (startVal === null || startVal === '') ? 0 : parseInt(startVal, 10);
      var end = (endVal === null || endVal === '') ? D.months.length - 1 : parseInt(endVal, 10);
      if (start > end) { var tmp = start; start = end; end = tmp; }
      xLabel = '月份';
      for (var j = start; j <= end; j++) {
        var tm = D.totals[j];
        var d = (j > 0) ? Math.round(tm.networth - D.totals[j - 1].networth) : null;  // 對上個月
        pts.push({ label: D.months[j], assets: tm.assets, liab: tm.liabilities, net: tm.networth, delta: d });
      }
    }
    return { xLabel: xLabel, points: pts };
  }

  // 資產組成：某月各資產帳戶 → {month, items:[{full,short,value}], total}
  function composition(idx) {
    var items = [];
    Object.keys(D.assetSeries).forEach(function (acc) {
      var v = D.assetSeries[acc][idx];
      if (v > 0.5) items.push({ full: acc, short: shortName(acc), value: v });
    });
    items.sort(function (a, b) { return b.value - a.value; });
    var total = items.reduce(function (s, it) { return s + it.value; }, 0);
    return { month: D.months[idx], items: items, total: total };
  }

  return {
    load: load, isEmpty: isEmpty,
    months: months, monthCount: monthCount, txnCount: txnCount, generatedAt: generatedAt,
    firstMonth: firstMonth, lastMonth: lastMonth, yearly: yearly, shortName: shortName,
    nowIndex: nowIndex, distinctYears: distinctYears, nowYear: nowYear,
    kpis: kpis, trendSeries: trendSeries, composition: composition, monthlyByYear: monthlyByYear
  };
})();
</script>
