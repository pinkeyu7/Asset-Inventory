<script>
// ViewModel（淨值趨勢）：顆粒度、起迄區間
(function () {
  var VM = App.ViewModel, M = App.Model;
  VM.state.trend = { granularity: 'year', start: null, end: null };

  VM.setRange = function (start, end) {
    var st = VM.state.trend;
    st.start = start; st.end = end;
    VM.emit('rangeChanged', { start: start, end: end });
    VM.emit('trendChanged');
  };

  VM.trend = function () { return VM.state.trend; };
  VM.trendData = function () { return M.trendSeries(VM.state.trend.granularity, VM.state.trend.start, VM.state.trend.end); };
  VM.kpis = function () { return M.kpis(); };

  VM.registerInit(function () {           // 預設顯示全部年度
    var ys = M.distinctYears();
    VM.setRange(ys[0], ys[ys.length - 1]);
  });
})();
</script>
