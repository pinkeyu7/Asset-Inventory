<script>
// Model（資產組成）：資產帳戶固定順序、某月組成
(function () {
  var M = App.Model;

  // 資產帳戶，依「全期最大餘額」由大到小排序（供固定配色用，與所選月份無關）
  M.assetAccounts = function () {
    var s = M.data().assetSeries || {};
    function maxOf(arr) { var m = 0; for (var i = 0; i < arr.length; i++) if (arr[i] > m) m = arr[i]; return m; }
    return Object.keys(s).sort(function (a, b) { return maxOf(s[b]) - maxOf(s[a]); });
  };

  // 各年份 → 該年最後一個月的索引（年底快照；當年若未滿則取最新月）
  M.compositionYears = function () {
    var months = M.data().months || [], map = {};
    months.forEach(function (m, i) { map[m.split('-')[0]] = i; });   // 同年後面的月會覆寫，留下年末索引
    return Object.keys(map).sort().map(function (y) { return { year: y, idx: map[y] }; });
  };

  // 某月底各資產帳戶 → {year, items:[{full,short,value}], total}
  M.composition = function (idx) {
    var D = M.data(), items = [];
    Object.keys(D.assetSeries).forEach(function (acc) {
      var v = D.assetSeries[acc][idx];
      if (v > 0.5) items.push({ full: acc, short: M.shortName(acc), value: v });
    });
    items.sort(function (a, b) { return b.value - a.value; });
    var total = items.reduce(function (s, it) { return s + it.value; }, 0);
    items.forEach(function (it) { it.pct = total ? it.value / total * 100 : 0; });
    return { year: (D.months[idx] || '').split('-')[0], items: items, total: total };
  };
})();
</script>
