<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('View_Styles') ?>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>個人資產變化紀錄</h1>
        <div class="sub" id="meta"></div>
      </div>
      <div class="upload hidden" id="upload">
        <input type="file" id="plistFile" accept=".plist,.xml,text/xml" hidden>
        <button class="upload-btn" id="uploadBtn">⬆️ 上傳 source.plist</button>
        <span class="upload-status" id="uploadStatus"></span>
      </div>
    </header>

    <div id="gate" class="gate hidden">
      <div class="gate-box">
        <h2>🔒 請輸入通關密碼</h2>
        <input type="password" id="gateCode" placeholder="密碼" autocomplete="current-password">
        <button id="gateBtn" class="upload-btn">進入</button>
        <div class="gate-err" id="gateErr"></div>
      </div>
    </div>

    <div id="loading" class="loading"><div class="spin"></div><div style="margin-top:10px">載入資料中…</div></div>
    <div id="app" class="hidden">
      <div class="tabs">
        <button class="tab active" data-view="trend">📈 淨值趨勢</button>
        <button class="tab" data-view="composition">🥧 資產組成</button>
        <button class="tab" data-view="monthly">📅 月度收支</button>
        <button class="tab" data-view="yearly">📊 年度收支</button>
      </div>

      <!-- 淨值趨勢 -->
      <section id="view-trend">
        <div class="kpis" id="kpis"></div>
        <div class="card">
          <h2>資產 / 負債 / 淨值 走勢</h2>
          <p class="hint">顯示各期期末（月底／年底）的累積餘額</p>
          <div class="controls">
            <span class="seg">
              <button class="gran active" data-gran="month">月</button>
              <button class="gran" data-gran="year">年</button>
            </span>
            <label>起</label><select id="trendStart"></select>
            <label>迄</label><select id="trendEnd"></select>
            <span class="presets">
              <button class="preset" data-months="12">近1年</button>
              <button class="preset" data-months="36">近3年</button>
              <button class="preset" data-months="60">近5年</button>
              <button class="preset" data-months="0">全部</button>
            </span>
          </div>
          <div id="trendChart" class="chart tall"></div>
          <div class="legend">
            <span class="lg-asset">總資產</span><span class="lg-liab">總負債</span><span class="lg-net">淨值</span><span class="lg-delta">淨值增減（長條・綠增紅減）</span>
          </div>
        </div>
      </section>

      <!-- 資產組成 -->
      <section id="view-composition" class="hidden">
        <div class="card">
          <h2>資產組成佔比</h2>
          <p class="hint">拖動時間軸查看任一月份的各資產帳戶分布</p>
          <div class="controls">
            <label>月份</label>
            <input type="range" id="monthSlider" min="0" value="0">
            <span class="month-badge" id="monthLabel"></span>
          </div>
          <div id="compChart" class="chart"></div>
        </div>
        <div class="card">
          <h2>該月各資產明細</h2>
          <div id="compTable"></div>
        </div>
      </section>

      <!-- 月度收支 -->
      <section id="view-monthly" class="hidden">
        <div class="card">
          <h2>月度收入 / 支出 / 淨結餘</h2>
          <p class="hint">選擇年份，檢視該年各月收支</p>
          <div class="controls">
            <label>年份</label><select id="monthlyYear"></select>
          </div>
          <div id="monthlyChart" class="chart tall"></div>
        </div>
        <div class="card">
          <h2>各月數字</h2>
          <div id="monthlyTable"></div>
        </div>
      </section>

      <!-- 年度收支 -->
      <section id="view-yearly" class="hidden">
        <div class="card">
          <h2>年度收入 / 支出 / 淨結餘</h2>
          <p class="hint">依交易發生年份彙總</p>
          <div id="yearlyChart" class="chart tall"></div>
        </div>
        <div class="card">
          <h2>年度數字</h2>
          <div id="yearlyTable"></div>
        </div>
      </section>
    </div>
    <div id="error" class="hidden"></div>
  </div>

  <!--PRELOADED_DATA-->
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <?!= include('Model') ?>
  <?!= include('Importer') ?>
  <?!= include('ViewModel') ?>
  <?!= include('View') ?>
</body>
</html>
