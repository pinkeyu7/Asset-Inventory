<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #f5f6f8; --card: #ffffff; --text: #1b1f27; --muted: #6b7280;
      --border: #e6e8ec; --accent: #2f6df6; --asset: #2f6df6; --liab: #e0533d;
      --net: #17a673; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1218; --card: #171b23; --text: #e8eaed; --muted: #9aa0aa;
        --border: #262b35; --accent: #5b8dff; --asset: #5b8dff; --liab: #ff7a63;
        --net: #35d29b; --shadow: 0 1px 3px rgba(0,0,0,.4);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 20px 16px 60px; }
    header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    h1 { font-size: 20px; margin: 0; font-weight: 700; }
    .sub { color: var(--muted); font-size: 12px; }

    .tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
    .tab {
      border: 1px solid var(--border); background: var(--card); color: var(--text);
      padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all .15s;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
    .kpi .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .kpi .value { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
    .kpi .unit { font-size: 13px; color: var(--muted); font-weight: 600; margin-left: 3px; }
    .kpi .delta { font-size: 12px; margin-top: 5px; font-weight: 600; }
    .up { color: var(--net); } .down { color: var(--liab); }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; }
    .card h2 { font-size: 15px; margin: 0 0 4px; }
    .card .hint { color: var(--muted); font-size: 12px; margin: 0 0 12px; }
    .chart { width: 100%; height: 380px; }
    .chart.tall { height: 420px; }

    .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .controls label { font-size: 13px; color: var(--muted); }
    input[type=range] { flex: 1; min-width: 180px; accent-color: var(--accent); }
    .month-badge { font-weight: 700; font-variant-numeric: tabular-nums; min-width: 66px; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: 8px; }
    .legend span::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
    .lg-asset::before { background: var(--asset); } .lg-liab::before { background: var(--liab); } .lg-net::before { background: var(--net); }

    .hidden { display: none; }
    .loading { text-align: center; color: var(--muted); padding: 60px 0; }
    .err { color: var(--liab); background: var(--card); border: 1px solid var(--liab); border-radius: 12px; padding: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
    th:first-child, td:first-child { text-align: left; }
    thead th { color: var(--muted); font-weight: 600; }
    .spin { display:inline-block; width:22px; height:22px; border:3px solid var(--border); border-top-color: var(--accent); border-radius:50%; animation: r 1s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>個人資產變化紀錄</h1>
        <div class="sub" id="meta"></div>
      </div>
    </header>

    <div id="loading" class="loading"><div class="spin"></div><div style="margin-top:10px">載入資料中…</div></div>
    <div id="app" class="hidden">
      <div class="tabs">
        <button class="tab active" data-view="trend">📈 淨值趨勢</button>
        <button class="tab" data-view="composition">🥧 資產組成</button>
        <button class="tab" data-view="yearly">📊 年度收支</button>
      </div>

      <!-- 淨值趨勢 -->
      <section id="view-trend">
        <div class="kpis" id="kpis"></div>
        <div class="card">
          <h2>資產 / 負債 / 淨值 走勢</h2>
          <p class="hint">依每月月底累積餘額計算</p>
          <div id="trendChart" class="chart tall"></div>
          <div class="legend">
            <span class="lg-asset">總資產</span><span class="lg-liab">總負債</span><span class="lg-net">淨值</span>
          </div>
        </div>
      </section>

      <!-- 資產組成 -->
      <section id="view-composition" class="hidden">
        <div class="card">
          <h2>資產組成佔比</h2>
          <p class="hint">拖動時間軸查看任一月份的各資產帳戶分布</p>
          <div class="controls">
            <label>月份</label>
            <input type="range" id="monthSlider" min="0" value="0">
            <span class="month-badge" id="monthLabel"></span>
          </div>
          <div id="compChart" class="chart"></div>
        </div>
        <div class="card">
          <h2>該月各資產明細</h2>
          <div id="compTable"></div>
        </div>
      </section>

      <!-- 年度收支 -->
      <section id="view-yearly" class="hidden">
        <div class="card">
          <h2>年度收入 / 支出 / 淨結餘</h2>
          <p class="hint">依交易發生年份彙總</p>
          <div id="yearlyChart" class="chart tall"></div>
        </div>
        <div class="card">
          <h2>年度數字</h2>
          <div id="yearlyTable"></div>
        </div>
      </section>
    </div>
    <div id="error" class="hidden"></div>
  </div>

  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    var DATA = null;
    var chartsReady = false;

    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(function () { chartsReady = true; maybeRender(); });

    google.script.run
      .withSuccessHandler(function (d) { DATA = d; maybeRender(); })
      .withFailureHandler(function (e) { showError(e && e.message ? e.message : e); })
      .getDashboardData();

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      var el = document.getElementById('error');
      el.classList.remove('hidden');
      el.className = 'err';
      el.textContent = '載入失敗：' + msg;
    }

    function maybeRender() {
      if (!DATA || !chartsReady) return;
      if (!DATA.months || !DATA.months.length) { showError('沒有交易資料，請確認已匯入 Transactions 工作表'); return; }
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('meta').textContent =
        DATA.txnCount + ' 筆交易 · ' + DATA.months[0] + ' ～ ' + DATA.months[DATA.months.length - 1] + ' · 更新於 ' + DATA.generatedAt;
      setupTabs();
      renderKPIs();
      renderTrend();
      setupComposition();
      renderYearly();
    }

    /* ---------- 格式化 ---------- */
    function fmtFull(n) { return 'NT$ ' + Math.round(n).toLocaleString('en-US'); }
    function fmtWan(n) {
      var abs = Math.abs(n);
      if (abs >= 1e8) return (n / 1e8).toFixed(2) + ' 億';
      if (abs >= 1e4) return (n / 1e4).toFixed(n >= 1e6 ? 0 : 1) + ' 萬';
      return Math.round(n).toLocaleString('en-US');
    }
    function name(full) {
      return (DATA.accountMeta[full] && DATA.accountMeta[full].short) || full.replace(/^[A-Z]-/, '');
    }
    function isDark() { return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
    function cssVar(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

    function baseOptions() {
      var text = cssVar('--text'), muted = cssVar('--muted'), grid = cssVar('--border');
      return {
        backgroundColor: 'transparent',
        chartArea: { left: 64, right: 16, top: 20, bottom: 44, width: '100%', height: '100%' },
        legend: { position: 'none' },
        fontName: '-apple-system, PingFang TC, sans-serif',
        hAxis: { textStyle: { color: muted, fontSize: 11 }, gridlines: { color: 'transparent' } },
        vAxis: { textStyle: { color: muted, fontSize: 11 }, gridlines: { color: grid, count: 5 }, baselineColor: grid,
                 format: 'short' },
        tooltip: { textStyle: { fontSize: 12 } }
      };
    }

    /* ---------- 分頁 ---------- */
    function setupTabs() {
      var tabs = document.querySelectorAll('.tab');
      tabs.forEach(function (t) {
        t.onclick = function () {
          tabs.forEach(function (x) { x.classList.remove('active'); });
          t.classList.add('active');
          ['trend', 'composition', 'yearly'].forEach(function (v) {
            document.getElementById('view-' + v).classList.toggle('hidden', v !== t.dataset.view);
          });
          // 切換分頁後重繪，避免隱藏時尺寸為 0
          if (t.dataset.view === 'trend') renderTrend();
          if (t.dataset.view === 'composition') renderComposition();
          if (t.dataset.view === 'yearly') renderYearly();
        };
      });
    }

    /* ---------- KPI ---------- */
    function renderKPIs() {
      var t = DATA.totals, last = t[t.length - 1];
      // 找 12 個月前作年增比較
      var prevIdx = Math.max(0, t.length - 13);
      var prev = t[prevIdx];
      var yoy = last.networth - prev.networth;
      var yoyPct = prev.networth ? (yoy / Math.abs(prev.networth) * 100) : 0;
      var el = document.getElementById('kpis');
      el.innerHTML =
        kpi('淨值', last.networth, '較一年前 ' + (yoy >= 0 ? '▲' : '▼') + ' ' + fmtWan(Math.abs(yoy)) + '（' + yoyPct.toFixed(1) + '%）', yoy >= 0) +
        kpi('總資產', last.assets, DATA.months[DATA.months.length - 1] + ' 月底', null) +
        kpi('總負債', last.liabilities, DATA.months[DATA.months.length - 1] + ' 月底', null);
    }
    function kpi(label, value, delta, up) {
      var deltaHtml = delta ? '<div class="delta ' + (up === null ? '' : (up ? 'up' : 'down')) + '">' + delta + '</div>' : '';
      return '<div class="kpi"><div class="label">' + label + '</div>' +
             '<div class="value">' + fmtWan(value) + '<span class="unit">' + (Math.abs(value) >= 1e8 ? '' : (Math.abs(value) >= 1e4 ? '' : '元')) + '</span></div>' +
             deltaHtml + '</div>';
    }

    /* ---------- 趨勢圖 ---------- */
    function renderTrend() {
      if (!chartsReady || !DATA) return;
      var rows = [['月份', '總資產', '總負債', '淨值']];
      for (var i = 0; i < DATA.months.length; i++) {
        var t = DATA.totals[i];
        rows.push([DATA.months[i], t.assets, t.liabilities, t.networth]);
      }
      var data = google.visualization.arrayToDataTable(rows);
      var o = baseOptions();
      o.seriesType = 'area';
      o.series = {
        0: { type: 'area', color: cssVar('--asset'), areaOpacity: 0.12, lineWidth: 2 },
        1: { type: 'area', color: cssVar('--liab'), areaOpacity: 0.10, lineWidth: 2 },
        2: { type: 'line', color: cssVar('--net'), lineWidth: 3 }
      };
      o.hAxis.showTextEvery = Math.ceil(DATA.months.length / 8);
      var chart = new google.visualization.ComboChart(document.getElementById('trendChart'));
      chart.draw(data, o);
    }

    /* ---------- 資產組成 ---------- */
    function setupComposition() {
      var slider = document.getElementById('monthSlider');
      slider.max = DATA.months.length - 1;
      slider.value = DATA.months.length - 1;
      slider.oninput = renderComposition;
      renderComposition();
    }
    function renderComposition() {
      if (!chartsReady || !DATA) return;
      var idx = parseInt(document.getElementById('monthSlider').value, 10) || 0;
      document.getElementById('monthLabel').textContent = DATA.months[idx];
      var rows = [['帳戶', '金額']];
      var items = [];
      Object.keys(DATA.assetSeries).forEach(function (acc) {
        var v = DATA.assetSeries[acc][idx];
        if (v > 0.5) items.push([acc, v]);
      });
      items.sort(function (a, b) { return b[1] - a[1]; });
      items.forEach(function (it) { rows.push([name(it[0]), it[1]]); });

      var o = baseOptions();
      o.chartArea = { left: 10, right: 10, top: 20, bottom: 20, width: '100%', height: '86%' };
      o.pieHole = 0.55;
      o.legend = { position: 'right', textStyle: { color: cssVar('--text'), fontSize: 12 }, alignment: 'center' };
      o.pieSliceText = 'percentage';
      o.pieSliceTextStyle = { color: '#fff', fontSize: 11 };
      o.tooltip = { text: 'value' };
      o.colors = ['#2f6df6', '#17a673', '#f5a623', '#e0533d', '#8a5cf6', '#12a4b8', '#d94f9a', '#6b7280', '#3fb27f', '#c98a2b'];
      var chart = new google.visualization.PieChart(document.getElementById('compChart'));
      if (rows.length < 2) { document.getElementById('compChart').innerHTML = '<p class="hint">該月無資產餘額</p>'; }
      else chart.draw(google.visualization.arrayToDataTable(rows), o);

      var total = items.reduce(function (s, it) { return s + it[1]; }, 0);
      var html = '<table><thead><tr><th>資產帳戶</th><th>金額</th><th>佔比</th></tr></thead><tbody>';
      items.forEach(function (it) {
        html += '<tr><td>' + name(it[0]) + '</td><td>' + fmtFull(it[1]) + '</td><td>' + (total ? (it[1] / total * 100).toFixed(1) : 0) + '%</td></tr>';
      });
      html += '<tr><td><b>合計</b></td><td><b>' + fmtFull(total) + '</b></td><td>100%</td></tr></tbody></table>';
      document.getElementById('compTable').innerHTML = html;
    }

    /* ---------- 年度收支 ---------- */
    function renderYearly() {
      if (!chartsReady || !DATA) return;
      var rows = [['年度', '收入', '支出', '淨結餘']];
      DATA.yearly.forEach(function (y) { rows.push([y.year, y.income, y.expense, y.net]); });
      var data = google.visualization.arrayToDataTable(rows);
      var o = baseOptions();
      o.seriesType = 'bars';
      o.series = {
        0: { type: 'bars', color: cssVar('--net') },
        1: { type: 'bars', color: cssVar('--liab') },
        2: { type: 'line', color: cssVar('--accent'), lineWidth: 3, pointSize: 4 }
      };
      o.bar = { groupWidth: '62%' };
      o.legend = { position: 'top', textStyle: { color: cssVar('--text'), fontSize: 12 } };
      var chart = new google.visualization.ComboChart(document.getElementById('yearlyChart'));
      chart.draw(data, o);

      var html = '<table><thead><tr><th>年度</th><th>收入</th><th>支出</th><th>淨結餘</th></tr></thead><tbody>';
      DATA.yearly.forEach(function (y) {
        html += '<tr><td>' + y.year + '</td><td>' + fmtFull(y.income) + '</td><td>' + fmtFull(y.expense) +
                '</td><td class="' + (y.net >= 0 ? 'up' : 'down') + '">' + fmtFull(y.net) + '</td></tr>';
      });
      html += '</tbody></table>';
      document.getElementById('yearlyTable').innerHTML = html;
    }

    // 深/淺色切換時重繪目前分頁
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addListener(function () {
        var active = document.querySelector('.tab.active');
        if (active) active.click();
      });
    }
    window.addEventListener('resize', function () {
      var active = document.querySelector('.tab.active');
      if (!active) return;
      var v = active.dataset.view;
      if (v === 'trend') renderTrend(); else if (v === 'composition') renderComposition(); else renderYearly();
    });
  </script>
</body>
</html>
