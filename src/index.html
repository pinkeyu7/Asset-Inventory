<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('view/View_Styles') ?>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>財富儀表板</h1>
      </div>
      <!-- 設定：齒輪圖示點開面板，內含資料狀態與「上傳 source.plist」（久久一次的維護動作，不佔主畫面）。 -->
      <div class="settings hidden" id="settings">
        <button class="settings-btn" id="settingsBtn" type="button" aria-label="設定" aria-expanded="false" aria-controls="settingsPanel">⚙️</button>
        <div class="settings-panel hidden" id="settingsPanel">
          <div class="settings-section">
            <div class="settings-label">資料狀態</div>
            <div class="sub" id="meta"></div>
          </div>
          <div class="settings-section upload hidden" id="upload">
            <div class="settings-label">更新資料</div>
            <input type="file" id="plistFile" accept=".plist,.xml,text/xml" hidden>
            <button class="upload-btn" id="uploadBtn">⬆️ 上傳 source.plist</button>
            <span class="upload-status" id="uploadStatus"></span>
          </div>
        </div>
      </div>
    </header>

    <div id="gate" class="gate hidden">
      <div class="gate-box">
        <h2>🔒 請輸入通關密碼</h2>
        <input type="password" id="gateCode" placeholder="密碼" autocomplete="current-password">
        <button id="gateBtn" class="upload-btn">進入</button>
        <div class="gate-err" id="gateErr"></div>
      </div>
    </div>

    <div id="loading" class="loading"><div class="spin"></div><div style="margin-top:10px">載入資料中…</div></div>
    <div id="app" class="hidden">
      <div class="tabs">
        <button class="tab active" data-view="trend">📈 淨值趨勢</button>
        <button class="tab" data-view="composition">🥧 資產組成</button>
        <button class="tab" data-view="monthly">📅 月度收支</button>
        <button class="tab" data-view="yearly">📊 年度收支</button>
        <button class="tab" data-view="income">💰 收入來源</button>
        <!-- 報告：3 份靜態分析收進下拉，主排只留常看的即時儀表板 -->
        <div class="tab-menu" id="reportMenu">
          <button class="tab tab-trigger" id="reportMenuBtn" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="reportMenuPanel">📄 報告 <span class="caret">▾</span></button>
          <div class="tab-dropdown hidden" id="reportMenuPanel" role="menu">
            <button class="menu-item" type="button" role="menuitem" data-view="realty">🏘️ 房產報酬</button>
            <button class="menu-item" type="button" role="menuitem" data-view="ctiming">⏳ C房賣點</button>
            <button class="menu-item" type="button" role="menuitem" data-view="fire">🏡 FIRE 規劃</button>
          </div>
        </div>
      </div>

      <!-- 淨值趨勢 -->
      <section id="view-trend">
        <div class="kpis" id="kpis"></div>
        <div class="card">
          <h2>資產 / 負債 / 淨值 走勢</h2>
          <p class="hint">顯示各年底的累積餘額</p>
          <div class="controls">
            <label>起</label><select id="trendStart"></select>
            <label>迄</label><select id="trendEnd"></select>
          </div>
          <div id="trendChart" class="chart tall"></div>
          <div class="legend">
            <span class="lg-asset">總資產</span><span class="lg-liab">總負債</span><span class="lg-net">淨值</span><span class="lg-delta">淨值增減（長條・綠增紅減）</span>
          </div>
        </div>
      </section>

      <!-- 資產組成 -->
      <section id="view-composition" class="hidden">
        <div class="card">
          <h2>資產組成佔比</h2>
          <p class="hint">拖動時間軸查看任一年底的各資產帳戶分布</p>
          <div class="controls">
            <label>年份</label>
            <input type="range" id="yearSlider" min="0" value="0">
            <span class="year-badge" id="yearLabel"></span>
          </div>
          <div id="compChart" class="chart"></div>
        </div>
        <div class="card">
          <h2>該年各資產明細</h2>
          <div id="compTable"></div>
        </div>
      </section>

      <!-- 月度收支 -->
      <section id="view-monthly" class="hidden">
        <div class="card">
          <h2>月度收入 / 支出 / 淨結餘</h2>
          <p class="hint">選擇年份，檢視該年各月收支</p>
          <div class="controls">
            <label>年份</label><select id="monthlyYear"></select>
          </div>
          <div id="monthlyChart" class="chart tall"></div>
        </div>
        <div class="card">
          <h2>各月數字</h2>
          <div id="monthlyTable"></div>
        </div>
      </section>

      <!-- 年度收支 -->
      <section id="view-yearly" class="hidden">
        <div class="card">
          <h2>年度收入 / 支出 / 淨結餘</h2>
          <p class="hint">依交易發生年份彙總</p>
          <div id="yearlyChart" class="chart tall"></div>
        </div>
        <div class="card">
          <h2>年度數字</h2>
          <div id="yearlyTable"></div>
        </div>
      </section>

      <!-- 收入來源 -->
      <section id="view-income" class="hidden">
        <div class="card">
          <h2>收入來源佔比</h2>
          <p class="hint">選擇年份（或全部），檢視各收入來源的金額與佔比</p>
          <div class="controls">
            <label>年份</label><select id="incomeYear"></select>
          </div>
          <div id="incomeChart" class="chart"></div>
        </div>
        <div class="card">
          <h2>各來源明細</h2>
          <div id="incomeTable"></div>
        </div>
        <div class="card">
          <h2>各來源年度比較</h2>
          <p class="hint">各收入來源歷年金額（堆疊，總高度＝當年總收入；與所選年份無關）</p>
          <div id="incomeTrendChart" class="chart tall"></div>
        </div>
      </section>

      <!-- 不動產報酬（靜態報告，樣式共用 .report） -->
      <section id="view-realty" class="report hidden">
        <?!= include('view/View_Realty_Report') ?>
      </section>

      <!-- C 房賣出時機（靜態報告，樣式共用 .report） -->
      <section id="view-ctiming" class="report hidden">
        <?!= include('view/View_CTiming_Report') ?>
      </section>

      <!-- FIRE 退休戰略（靜態報告，配色吃深/淺主題） -->
      <section id="view-fire" class="report hidden">
        <?!= include('view/View_Fire_Report') ?>
      </section>
    </div>
    <div id="error" class="hidden"></div>
  </div>

  <!--PRELOADED_DATA-->
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <!-- Model 層 -->

  <?!= include('model/Model_Trend') ?>
  <?!= include('model/Model_Composition') ?>
  <?!= include('model/Model_Monthly') ?>
  <?!= include('model/Model_Yearly') ?>
  <?!= include('model/Model_Income') ?>
  <?!= include('model/Importer') ?>

  <?!= include('viewmodel/ViewModel_Trend') ?>
  <?!= include('viewmodel/ViewModel_Composition') ?>

  <?!= include('viewmodel/ViewModel_Yearly') ?>
  <?!= include('viewmodel/ViewModel_Income') ?>

  <!-- View 層 -->
  <?!= include('view/Core_View') ?>
  <?!= include('view/View_Trend') ?>
  <?!= include('view/View_Composition') ?>
  <?!= include('view/View_Monthly') ?>
  <?!= include('view/View_Yearly') ?>
  <?!= include('view/View_Income') ?>
  <?!= include('view/View_Report_Export') ?>
  <?!= include('view/View_Realty') ?>
  <?!= include('view/View_CTiming') ?>

  <script>App.View.boot();</script>
</body>
</html>
