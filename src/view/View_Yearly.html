<script>
// View（年度收支）：各年收入/支出/淨結餘（明細表最新年份在上）
(function () {
  var V = App.View, VM = App.ViewModel;

  function render() {
    if (!V.chartsReady()) return;
    var yearly = VM.yearlyData();
    var rows = [['年度', '收入', '支出', '淨結餘']];
    yearly.forEach(function (y) { rows.push([y.year, y.income, y.expense, y.net]); });
    var o = V.baseOptions();
    o.seriesType = 'bars';
    o.series = {
      0: { type: 'bars', color: V.cssVar('--net') },
      1: { type: 'bars', color: V.cssVar('--liab') },
      2: { type: 'line', color: V.cssVar('--accent'), lineWidth: 3, pointSize: 4 }
    };
    o.bar = { groupWidth: '62%' };
    o.legend = { position: 'top', textStyle: { color: V.cssVar('--text'), fontSize: 12 } };
    new google.visualization.ComboChart(V.$('yearlyChart')).draw(google.visualization.arrayToDataTable(rows), o);

    var html = '<table><thead><tr><th>年度</th><th>收入</th><th>支出</th><th>淨結餘</th></tr></thead><tbody>';
    yearly.slice().reverse().forEach(function (y) {
      html += '<tr><td>' + y.year + '</td><td>' + V.fmtFull(y.income) + '</td><td>' + V.fmtFull(y.expense) +
              '</td><td class="' + (y.net >= 0 ? 'up' : 'down') + '">' + V.fmtFull(y.net) + '</td></tr>';
    });
    html += '</tbody></table>';
    V.$('yearlyTable').innerHTML = html;
  }

  V.registerPage({ name: 'yearly', render: render });
})();
</script>
