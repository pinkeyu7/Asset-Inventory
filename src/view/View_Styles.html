<style>
  :root {
    --bg: #f5f6f8; --card: #ffffff; --text: #1b1f27; --muted: #6b7280;
    --border: #e6e8ec; --accent: #2f6df6; --asset: #2f6df6; --liab: #e0533d;
    --net: #17a673; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1218; --card: #171b23; --text: #e8eaed; --muted: #9aa0aa;
      --border: #262b35; --accent: #5b8dff; --asset: #5b8dff; --liab: #ff7a63;
      --net: #35d29b; --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 20px 16px 60px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  h1 { font-size: 20px; margin: 0; font-weight: 700; }
  .sub { color: var(--muted); font-size: 12px; }
  /* 設定：齒輪按鈕 + 彈出面板（右上角 dropdown） */
  .settings { position: relative; }
  .settings-btn { border: 1px solid var(--border); background: var(--card); color: var(--text); width: 38px; height: 38px; border-radius: 999px; cursor: pointer; font-size: 16px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .settings-btn:hover { border-color: var(--accent); }
  .settings-panel { position: absolute; right: 0; top: calc(100% + 8px); z-index: 20; min-width: 260px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .settings-section { display: flex; flex-direction: column; gap: 8px; }
  .settings-label { font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--muted); text-transform: uppercase; }
  .upload { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .upload-btn {
    border: 1px solid var(--accent); background: var(--accent); color: #fff;
    padding: 8px 14px; border-radius: 999px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .upload-btn:hover { opacity: .9; }
  .upload-btn:disabled { opacity: .5; cursor: default; }
  .upload-status { font-size: 12px; color: var(--muted); }
  .gate { padding: 56px 0; display: flex; justify-content: center; }
  .gate-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 28px; width: 100%; max-width: 340px; text-align: center; }
  .gate-box h2 { font-size: 16px; margin: 0 0 16px; }
  /* font-size 需 ≥16px，否則 iOS Safari 聚焦輸入框時會自動放大頁面 */
  .gate-box input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 16px; margin-bottom: 12px; }
  .gate-box .upload-btn { width: 100%; }
  .gate-err { color: var(--liab); font-size: 12px; margin-top: 10px; min-height: 16px; }

  .tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .tab {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 600;
    transition: all .15s;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
  .kpi .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .kpi .value { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
  .kpi .unit { font-size: 13px; color: var(--muted); font-weight: 600; margin-left: 3px; }
  .kpi .delta { font-size: 12px; margin-top: 5px; font-weight: 600; }
  .up { color: var(--net); } .down { color: var(--liab); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .card h2 { font-size: 15px; margin: 0 0 4px; }
  .card .hint { color: var(--muted); font-size: 12px; margin: 0 0 12px; }
  .chart { width: 100%; height: 380px; }
  .chart.tall { height: 420px; }

  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .controls label { font-size: 13px; color: var(--muted); }
  input[type=range] { flex: 1; min-width: 180px; accent-color: var(--accent); }
  .month-badge { font-weight: 700; font-variant-numeric: tabular-nums; min-width: 66px; }
  select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px; font-size: 13px; font-variant-numeric: tabular-nums;
  }
  .presets { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
  .preset, .gran {
    border: 1px solid var(--border); background: var(--card); color: var(--muted);
    padding: 5px 11px; border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .preset:hover, .gran:hover { color: var(--text); border-color: var(--accent); }
  .preset.active, .gran.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .seg { display: inline-flex; gap: 4px; padding-right: 6px; border-right: 1px solid var(--border); margin-right: 4px; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: 8px; }
  .legend span::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
  .lg-asset::before { background: var(--asset); } .lg-liab::before { background: var(--liab); } .lg-net::before { background: var(--net); }
  .lg-delta::before { background: linear-gradient(90deg, var(--net) 50%, var(--liab) 50%); }

  .hidden { display: none; }
  .loading { text-align: center; color: var(--muted); padding: 60px 0; }
  .err { color: var(--liab); background: var(--card); border: 1px solid var(--liab); border-radius: 12px; padding: 16px; }
  .note { color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child { text-align: left; }
  thead th { color: var(--muted); font-weight: 600; }
  .spin { display:inline-block; width:22px; height:22px; border:3px solid var(--border); border-top-color: var(--accent); border-radius:50%; animation: r 1s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }

  /* ---------- 靜態報告共用樣式（FIRE 退休戰略、不動產報酬…；固定配色對應主題變數，深/淺色皆可讀）---------- */
  .report { line-height: 1.65; --report-gold: #c5a880; --report-navy: #1a365d; --report-warn: #c05621; --report-info: #2b6cb0; }
  @media (prefers-color-scheme: dark) {
    .report { --report-warn: #f0a868; --report-info: #6fa8e6; }
  }
  /* 深藍金 hero／結語：兩種主題都維持識別色 */
  .report .header-banner { position: relative; background: var(--report-navy); color: #fff; padding: 26px 28px; border-bottom: 5px solid var(--report-gold); border-radius: 14px; margin-bottom: 22px; box-shadow: var(--shadow); }
  /* 匯出 Markdown：hero 右上角的低調金色描邊小按鈕 */
  .report .report-export-btn { position: absolute; top: 20px; right: 20px; background: transparent; color: var(--report-gold); border: 1px solid var(--report-gold); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s, color .15s; }
  .report .report-export-btn:hover { background: var(--report-gold); color: var(--report-navy); }
  /* 窄螢幕：改為正常排列，避免壓到長標題 */
  @media (max-width: 640px) {
    .report .report-export-btn { position: static; display: inline-block; margin-bottom: 14px; }
  }
  .report .header-banner h1 { font-size: 22px; margin: 0 0 12px; font-weight: 700; color: #fff; }
  .report .meta-info { font-size: 13px; color: #cbd5e0; margin: 4px 0; }
  .report .meta-info strong { color: #e2e8f0; }
  .report .verdict { margin-top: 14px; padding-top: 12px; border-top: 1px solid #2c5282; font-size: 15px; color: #f0fff4; font-weight: 700; }
  .report .report-closing { background: var(--report-navy); color: #e2e8f0; padding: 26px 28px; border-top: 5px solid var(--report-gold); border-radius: 14px; margin: 22px 0 0; line-height: 1.85; }
  .report .report-closing p { margin: 0 0 14px; }
  .report .report-closing p.last { margin: 0; }
  .report .report-closing strong.w { color: #fff; }
  .report .report-closing strong.g { color: var(--report-gold); }
  .report .report-closing strong.big { font-size: 1.15em; }

  /* 標題／內文 */
  .report h2 { font-size: 18px; color: var(--text); border-left: 5px solid var(--report-gold); padding-left: 12px; margin: 34px 0 14px; }
  .report h3 { font-size: 15px; color: var(--accent); margin: 22px 0 10px; }
  .report p { margin: 12px 0; }
  .report ul { margin: 12px 0; padding-left: 22px; }
  .report li { margin: 6px 0; }
  .report .bold { font-weight: bold; }
  .report .text-center { text-align: center; }
  .report .neg { color: var(--liab); font-weight: bold; }

  /* 算式／程式碼：等寬字、保留換行、可橫向捲動 */
  .report pre { background: rgba(127,127,127,.10); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin: 14px 0; overflow-x: auto; font-size: 12.5px; line-height: 1.55; }
  .report code, .report pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .report pre.formula { color: var(--accent); }
  .report details { margin: 14px 0; }
  .report summary { cursor: pointer; font-weight: 600; color: var(--accent); }

  /* 表格：左對齊、實線框、深色表頭；語意色用 --net/--liab */
  .report .table-wrap { overflow-x: auto; }
  .report table { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 13px; }
  .report th, .report td { padding: 10px; border: 1px solid var(--border); text-align: left; vertical-align: top; }
  .report thead th { background: #2d3748; color: #fff; font-weight: 600; }
  .report tbody tr:nth-child(even) { background: rgba(127,127,127,.06); }
  .report .win-header { background: var(--net) !important; color: #fff !important; }
  .report .highlight-cell { background: rgba(23,166,115,.14) !important; font-weight: bold; border-color: var(--net); color: var(--net); }
  .report .total-row { background: rgba(127,127,127,.12) !important; font-weight: bold; }
  .report .profit-row { background: rgba(23,166,115,.14) !important; font-weight: bold; color: var(--net); }

  /* 提示框：半透明底色疊在頁面上，深/淺皆自然 */
  .report .alert-callout, .report .callout, .report .conclusion, .report .note {
    padding: 14px 16px; margin: 18px 0; border-radius: 8px; border-left: 4px solid var(--muted);
  }
  .report .alert-callout { background: rgba(221,107,32,.10); border-left-color: var(--report-warn); }
  .report .callout { background: rgba(49,130,206,.10); border-left-color: var(--report-info); }
  .report .conclusion { background: rgba(23,166,115,.12); border-left-color: var(--net); }
  .report .note { background: rgba(127,127,127,.08); border-left-color: var(--muted); font-size: 13px; color: var(--muted); }
  .report .alert-callout > .bold { color: var(--report-warn); margin-bottom: 4px; }
  .report .callout > .bold { color: var(--report-info); margin-bottom: 4px; }
  .report .conclusion > .bold { color: var(--net); margin-bottom: 4px; }
</style>
