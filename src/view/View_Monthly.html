<script>
// View（月度收支）：某年各月收入/支出/淨結餘
(function () {
  var V = App.View, VM = App.ViewModel, M = App.Model;

  function render() {
    if (!V.chartsReady()) return;
    var pts = VM.monthlyData();
    var o = V.incomeExpenseNetOptions();
    if (!pts.length) { V.$('monthlyChart').innerHTML = '<p class="hint">該年無資料</p>'; }
    else {
      var rows = [['月份', '收入', '支出', '淨結餘']];
      pts.forEach(function (p) { rows.push([parseInt(p.mm, 10) + '月', p.income, p.expense, p.net]); });
      new google.visualization.ComboChart(V.$('monthlyChart')).draw(google.visualization.arrayToDataTable(rows), o);
    }
    var tableRows = pts.map(function (p) {
      return { label: parseInt(p.mm, 10) + '月', income: p.income, expense: p.expense, net: p.net };
    });
    V.$('monthlyTable').innerHTML = V.incomeExpenseNetTableHtml('月份', tableRows);
  }

  function populateYears() {
    V.$('monthlyYear').innerHTML = M.distinctYears().map(function (y) { return '<option value="' + y + '">' + y + '</option>'; }).join('');
    V.$('monthlyYear').value = VM.monthlyYear();
  }
  function reload() { populateYears(); }
  function wire() {
    V.$('monthlyYear').onchange = function () { VM.setMonthlyYear(this.value); };
    VM.on('monthlyChanged', function () { render(); });
  }

  V.registerPage({ name: 'monthly', render: render, wire: wire, reload: reload });
})();
</script>
