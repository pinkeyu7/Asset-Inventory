<script>
// View（C 房賣出時機）：靜態分析報告頁。
//   同 FIRE／不動產報酬報告——手寫內容、非帳本計算，不設 Model／ViewModel 層，也無 render/reload。
//   報告 HTML 寫在 index.html 的 <section id="view-ctiming">，這裡只向核心註冊分頁，
//   並用共用工具 App.View.bindReportExport 綁定「匯出 Markdown」（見 View_Report_Export）。
(function () {
  function wire() {
    App.View.bindReportExport('cTimingExportBtn', 'view-ctiming', 'C房賣出時機分析.md');
  }
  App.View.registerPage({ name: 'ctiming', wire: wire });
})();
</script>
