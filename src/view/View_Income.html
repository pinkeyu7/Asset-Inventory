<script>
// View（收入來源）：環圈圖 + 明細 + 年度比較堆疊圖，依帳戶固定配色
(function () {
  var V = App.View, VM = App.ViewModel, M = App.Model;

  var INCOME_PALETTE = ['#17a673', '#2f6df6', '#f5a623', '#8a5cf6', '#12a4b8', '#e0533d', '#d94f9a', '#6b7280', '#3fb27f', '#c98a2b'];
  var colors = V.makeColorMap(INCOME_PALETTE);

  function render() {
    if (!V.chartsReady()) return;
    colors.ensure(M.incomeAccounts());
    var c = VM.incomeData();
    var o = V.donutOptions();
    o.colors = c.items.map(function (it) { return colors.of(it.full); });
    if (!c.items.length) { V.$('incomeChart').innerHTML = '<p class="hint">該期間無收入</p>'; }
    else {
      var rows = [['來源', '金額']];
      c.items.forEach(function (it) { rows.push([it.short, it.value]); });
      new google.visualization.PieChart(V.$('incomeChart')).draw(google.visualization.arrayToDataTable(rows), o);
    }
    V.$('incomeTable').innerHTML = V.breakdownTableHtml('收入來源', c.items, c.total);
    renderTrend();
  }

  function renderTrend() {
    if (!V.chartsReady()) return;
    colors.ensure(M.incomeAccounts());
    var t = VM.incomeTrendData();
    if (!t.years.length || !t.accounts.length) { V.$('incomeTrendChart').innerHTML = ''; return; }
    var rows = [['年度'].concat(t.accounts.map(function (a) { return a.short; }))];
    t.years.forEach(function (y, i) { rows.push([y].concat(t.rows[i])); });
    var o = V.baseOptions();
    o.isStacked = true;
    o.bar = { groupWidth: '70%' };
    o.legend = { position: 'top', maxLines: 3, textStyle: { color: V.cssVar('--text'), fontSize: 11 } };
    o.colors = t.accounts.map(function (a) { return colors.of(a.full); });
    o.hAxis.showTextEvery = 1;
    new google.visualization.ColumnChart(V.$('incomeTrendChart')).draw(google.visualization.arrayToDataTable(rows), o);
  }

  function populateYears() {
    colors.reset();                        // 重建配色（上傳新資料後帳戶可能改變）
    V.$('incomeYear').innerHTML = '<option value="ALL">全部</option>' +
      M.distinctYears().map(function (y) { return '<option value="' + y + '">' + y + '</option>'; }).join('');
    V.$('incomeYear').value = VM.incomeYear();
  }
  function reload() { populateYears(); }
  function wire() {
    V.$('incomeYear').onchange = function () { VM.setIncomeYear(this.value); };
    VM.on('incomeChanged', function () { render(); });
  }

  V.registerPage({ name: 'income', render: render, wire: wire, reload: reload });
})();
</script>
