<script>
// View（資產組成）：環圈圖 + 明細，依帳戶固定配色，月份滑桿
(function () {
  var V = App.View, VM = App.ViewModel, M = App.Model;

  var ASSET_PALETTE = ['#2f6df6', '#17a673', '#f5a623', '#e0533d', '#8a5cf6', '#12a4b8', '#d94f9a', '#6b7280', '#3fb27f', '#c98a2b'];
  var colors = V.makeColorMap(ASSET_PALETTE);

  function render() {
    if (!V.chartsReady()) return;
    colors.ensure(M.assetAccounts());
    var c = VM.compositionData();
    V.$('monthLabel').textContent = c.month;
    var o = V.donutOptions();
    o.colors = c.items.map(function (it) { return colors.of(it.full); });
    if (!c.items.length) { V.$('compChart').innerHTML = '<p class="hint">該月無資產餘額</p>'; }
    else {
      var rows = [['帳戶', '金額']];
      c.items.forEach(function (it) { rows.push([it.short, it.value]); });
      new google.visualization.PieChart(V.$('compChart')).draw(google.visualization.arrayToDataTable(rows), o);
    }
    V.$('compTable').innerHTML = V.breakdownTableHtml('資產帳戶', c.items, c.total);
  }

  function reload() {
    colors.reset();                        // 重建配色（上傳新資料後帳戶可能改變）
    var slider = V.$('monthSlider');
    slider.max = M.monthCount() - 1;
    slider.value = M.monthCount() - 1;
  }

  function wire() {
    V.$('monthSlider').oninput = function () { VM.setCompositionMonth(parseInt(this.value, 10) || 0); };
    VM.on('compositionChanged', function () { render(); });
  }

  V.registerPage({ name: 'composition', render: render, wire: wire, reload: reload });
})();
</script>
