<script>
// ============================================================
// Core View —— 呈現層工具、頁面註冊、啟動流程、分頁/上傳/通關密碼
//   各頁 View 檔透過 App.View.registerPage 註冊 render/wire/beforeInit/reload。
// ============================================================
window.App = window.App || {};
App.View = (function () {
  var VM = App.ViewModel, M = App.Model;
  var chartsReady = false, dataReady = false, started = false, pendingData = null, accessCode = '';
  var pages = [];   // { name, render, wire, beforeInit, reload }

  // ---------- 呈現層工具（共用給各頁）----------
  function $(id) { return document.getElementById(id); }
  function cssVar(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
  function fmtFull(n) { return 'NT$ ' + Math.round(n).toLocaleString('en-US'); }
  function fmtWan(n) {
    var abs = Math.abs(n);
    if (abs >= 1e8) return (n / 1e8).toFixed(2) + ' 億';
    if (abs >= 1e4) return (n / 1e4).toFixed(n >= 1e6 ? 0 : 1) + ' 萬';
    return Math.round(n).toLocaleString('en-US');
  }
  function baseOptions() {
    var muted = cssVar('--muted'), grid = cssVar('--border');
    return {
      backgroundColor: 'transparent',
      chartArea: { left: 64, right: 16, top: 20, bottom: 44, width: '100%', height: '100%' },
      legend: { position: 'none' },
      fontName: '-apple-system, PingFang TC, sans-serif',
      hAxis: { textStyle: { color: muted, fontSize: 11 }, gridlines: { color: 'transparent' } },
      vAxis: { textStyle: { color: muted, fontSize: 11 }, gridlines: { color: grid, count: 5 }, baselineColor: grid, format: 'short' },
      tooltip: { textStyle: { fontSize: 12 } }
    };
  }
  // 依帳戶固定配色：給一組調色盤，回傳可記憶的對應器（上傳新資料後 reset 重建）
  function makeColorMap(palette) {
    var map = null;
    return {
      reset: function () { map = null; },
      ensure: function (accounts) {
        if (map) return;
        map = {};
        accounts.forEach(function (full, i) { map[full] = palette[i % palette.length]; });
      },
      of: function (full) { return map ? map[full] : undefined; }
    };
  }

  // 環圈圖共用選項（組成頁 / 收入頁）；呼叫端自行補上 o.colors
  function donutOptions() {
    var o = baseOptions();
    o.chartArea = { left: 10, right: 10, top: 20, bottom: 20, width: '100%', height: '86%' };
    o.pieHole = 0.55;
    o.legend = { position: 'right', textStyle: { color: cssVar('--text'), fontSize: 12 }, alignment: 'center' };
    o.pieSliceText = 'percentage';
    o.pieSliceTextStyle = { color: '#fff', fontSize: 11 };
    o.tooltip = { text: 'value' };
    return o;
  }

  // 收入/支出/淨結餘 ComboChart 共用選項（月度頁 / 年度頁）
  function incomeExpenseNetOptions() {
    var o = baseOptions();
    o.seriesType = 'bars';
    o.series = {
      0: { type: 'bars', color: cssVar('--net') },
      1: { type: 'bars', color: cssVar('--liab') },
      2: { type: 'line', color: cssVar('--accent'), lineWidth: 3, pointSize: 4 }
    };
    o.bar = { groupWidth: '62%' };
    o.legend = { position: 'top', textStyle: { color: cssVar('--text'), fontSize: 12 } };
    return o;
  }

  // 佔比明細表 HTML（組成頁 / 收入頁）：items 需含 short/value/pct，末列自動加合計
  function breakdownTableHtml(firstColLabel, items, total) {
    var html = '<table><thead><tr><th>' + firstColLabel + '</th><th>金額</th><th>佔比</th></tr></thead><tbody>';
    items.forEach(function (it) {
      html += '<tr><td>' + it.short + '</td><td>' + fmtFull(it.value) + '</td><td>' + it.pct.toFixed(1) + '%</td></tr>';
    });
    return html + '<tr><td><b>合計</b></td><td><b>' + fmtFull(total) + '</b></td><td>100%</td></tr></tbody></table>';
  }

  // 收入/支出/淨結餘明細表 HTML（月度頁 / 年度頁）：rows 為 [{label,income,expense,net}]，順序即顯示順序
  function incomeExpenseNetTableHtml(firstColLabel, rows) {
    var html = '<table><thead><tr><th>' + firstColLabel + '</th><th>收入</th><th>支出</th><th>淨結餘</th></tr></thead><tbody>';
    rows.forEach(function (r) {
      html += '<tr><td>' + r.label + '</td><td>' + fmtFull(r.income) + '</td><td>' + fmtFull(r.expense) +
              '</td><td class="' + (r.net >= 0 ? 'up' : 'down') + '">' + fmtFull(r.net) + '</td></tr>';
    });
    return html + '</tbody></table>';
  }

  function isReady() { return chartsReady; }

  function registerPage(p) { pages.push(p); }
  function renderActive() {
    var v = VM.activeView();
    for (var i = 0; i < pages.length; i++) if (pages[i].name === v) { if (pages[i].render) pages[i].render(); return; }
  }
  function renderAll() { pages.forEach(function (p) { if (p.render) p.render(); }); }

  // ---------- 狀態畫面 ----------
  function showError(msg) {
    $('loading').classList.add('hidden');
    var el = $('error'); el.classList.remove('hidden'); el.className = 'err';
    el.textContent = '載入失敗：' + msg;
  }
  function showEmpty() {
    $('loading').classList.add('hidden'); $('app').classList.add('hidden');
    if ($('settings')) $('settings').classList.remove('hidden');
    if ($('upload')) $('upload').classList.remove('hidden');
    var el = $('error'); el.classList.remove('hidden'); el.className = 'note';
    el.textContent = '尚無資料。請點右上角「⬆️ 上傳 source.plist」匯入你的記帳檔。';
  }

  // 載入資料到 Model 並完整重繪（初次載入與上傳後重載共用）
  function loadAndRender(data) {
    M.load(data);
    if (M.isEmpty()) { showEmpty(); return; }
    $('error').classList.add('hidden'); $('loading').classList.add('hidden');
    $('app').classList.remove('hidden');
    if ($('settings')) $('settings').classList.remove('hidden');
    if ($('upload')) $('upload').classList.remove('hidden');
    pages.forEach(function (p) { if (p.beforeInit) p.beforeInit(); });   // 例：趨勢頁先建起/迄選項
    VM.init();
    pages.forEach(function (p) { if (p.reload) p.reload(); });           // 例：各頁重建選單/配色
    $('meta').textContent = M.txnCount() + ' 筆交易 · ' + M.firstMonth() + ' ～ ' + M.lastMonth() + ' · 更新於 ' + M.generatedAt();
    renderAll();
  }

  function tryStart() { if (started || !chartsReady || !dataReady) return; started = true; loadAndRender(pendingData); }
  function onData(data) { pendingData = data; dataReady = true; tryStart(); }

  // ---------- 上傳 source.plist ----------
  function setUploadStatus(msg, isErr) {
    var el = $('uploadStatus'); el.textContent = msg;
    el.style.color = isErr ? cssVar('--liab') : cssVar('--muted');
  }
  function wireUpload() {
    var btn = $('uploadBtn'), input = $('plistFile');
    if (!btn || !input) return;
    btn.onclick = function () { input.click(); };
    input.onchange = function () {
      var f = input.files && input.files[0];
      input.value = '';
      if (!f) return;
      setUploadStatus('讀取「' + f.name + '」…');
      var reader = new FileReader();
      reader.onerror = function () { setUploadStatus('❌ 讀檔失敗', true); };
      reader.onload = function () {
        var rows;
        try { rows = App.Importer.plistToRows(reader.result); }
        catch (e) { setUploadStatus('❌ 解析失敗：' + e.message, true); return; }
        var nT = rows.transactions.length - 1, nA = rows.accounts.length - 1;
        if (!window.google || !google.script || !google.script.run) {
          setUploadStatus('已解析 ' + nT + ' 筆交易、' + nA + ' 個帳戶（預覽模式不寫入，請於 GAS 網頁使用）');
          return;
        }
        setUploadStatus('已解析 ' + nT + ' 筆交易，寫入試算表中…');
        btn.disabled = true;
        google.script.run
          .withSuccessHandler(function (fresh) {
            btn.disabled = false;
            setUploadStatus('✅ 匯入完成：' + nT + ' 筆交易、' + nA + ' 個帳戶');
            started = true;
            loadAndRender(fresh);
          })
          .withFailureHandler(function (e) {
            btn.disabled = false;
            setUploadStatus('❌ 寫入失敗：' + (e && e.message ? e.message : e), true);
          })
          .importData(rows, accessCode);
      };
      reader.readAsText(f);
    };
  }

  // ---------- 設定面板（齒輪 dropdown）----------
  function wireSettings() {
    var btn = $('settingsBtn'), panel = $('settingsPanel');
    if (!btn || !panel) return;
    function close() { panel.classList.add('hidden'); btn.setAttribute('aria-expanded', 'false'); }
    btn.onclick = function (e) {
      e.stopPropagation();
      var nowHidden = panel.classList.toggle('hidden');
      btn.setAttribute('aria-expanded', nowHidden ? 'false' : 'true');
    };
    document.addEventListener('click', function (e) {   // 點面板外關閉
      if (!panel.classList.contains('hidden') && !panel.contains(e.target) && e.target !== btn) close();
    });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
  }

  // ---------- 通關密碼 ----------
  function showGate() {
    $('gate').classList.remove('hidden');
    $('loading').classList.add('hidden'); $('app').classList.add('hidden'); $('error').classList.add('hidden');
    setTimeout(function () { var i = $('gateCode'); if (i) i.focus(); }, 50);
  }
  function requestData(code) {
    $('gateErr').style.color = cssVar('--muted');
    $('gateErr').textContent = '驗證中…';
    google.script.run
      .withSuccessHandler(function (data) {
        accessCode = code;
        try { sessionStorage.setItem('ai_code', code); } catch (e) {}
        $('gate').classList.add('hidden');
        $('loading').classList.remove('hidden');
        onData(data);
      })
      .withFailureHandler(function (e) {
        $('gateErr').style.color = cssVar('--liab');
        $('gateErr').textContent = (e && e.message ? e.message : String(e));
        var i = $('gateCode'); if (i) i.select();
      })
      .getDashboardData(code);
  }
  function wireGate() {
    var btn = $('gateBtn'), input = $('gateCode');
    if (!btn || !input) return;
    function submit() { var c = input.value; if (!c) { $('gateErr').textContent = '請輸入密碼'; return; } requestData(c); }
    btn.onclick = submit;
    input.onkeydown = function (e) { if (e.key === 'Enter') submit(); };
  }

  // ---------- 核心事件與啟動 ----------
  function wireCore() {
    document.querySelectorAll('.tab').forEach(function (t) {
      t.onclick = function () { VM.setActiveView(t.dataset.view); };
    });
    VM.on('activeViewChanged', function (v) {
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.toggle('active', t.dataset.view === v); });
      pages.forEach(function (p) { var el = $('view-' + p.name); if (el) el.classList.toggle('hidden', p.name !== v); });
      renderActive();
    });
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addListener(function () { renderActive(); });
    }
    window.addEventListener('resize', function () { renderActive(); });
    wireUpload();
    wireSettings();
    wireGate();
  }

  function boot() {
    wireCore();
    pages.forEach(function (p) { if (p.wire) p.wire(); });
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(function () { chartsReady = true; tryStart(); });

    if (window.PRELOADED_DATA) { onData(window.PRELOADED_DATA); return; }   // 本機預覽：免密碼
    showGate();
    var saved = '';
    try { saved = sessionStorage.getItem('ai_code') || ''; } catch (e) {}
    if (saved) requestData(saved);
  }

  return {
    $: $, cssVar: cssVar, fmtFull: fmtFull, fmtWan: fmtWan, baseOptions: baseOptions,
    makeColorMap: makeColorMap, donutOptions: donutOptions, incomeExpenseNetOptions: incomeExpenseNetOptions,
    breakdownTableHtml: breakdownTableHtml, incomeExpenseNetTableHtml: incomeExpenseNetTableHtml,
    chartsReady: isReady, registerPage: registerPage, renderActive: renderActive, boot: boot
  };
})();
</script>
