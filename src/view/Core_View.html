<script>
// ============================================================
// Core View вҖ”вҖ” е‘ҲзҸҫеұӨе·Ҙе…·гҖҒй ҒйқўиЁ»еҶҠгҖҒе•ҹеӢ•жөҒзЁӢгҖҒеҲҶй Ғ/дёҠеӮі/йҖҡй—ңеҜҶзўј
//   еҗ„й Ғ View жӘ”йҖҸйҒҺ App.View.registerPage иЁ»еҶҠ render/wire/beforeInit/reloadгҖӮ
// ============================================================
window.App = window.App || {};
App.View = (function () {
  var VM = App.ViewModel, M = App.Model;
  var chartsReady = false, dataReady = false, started = false, pendingData = null, accessCode = '';
  var pages = [];   // { name, render, wire, beforeInit, reload }

  // ---------- е‘ҲзҸҫеұӨе·Ҙе…·пјҲе…ұз”ЁзөҰеҗ„й Ғпјү----------
  function $(id) { return document.getElementById(id); }
  function cssVar(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
  function fmtFull(n) { return 'NT$ ' + Math.round(n).toLocaleString('en-US'); }
  function fmtWan(n) {
    var abs = Math.abs(n);
    if (abs >= 1e8) return (n / 1e8).toFixed(2) + ' е„„';
    if (abs >= 1e4) return (n / 1e4).toFixed(n >= 1e6 ? 0 : 1) + ' иҗ¬';
    return Math.round(n).toLocaleString('en-US');
  }
  function baseOptions() {
    var muted = cssVar('--muted'), grid = cssVar('--border');
    return {
      backgroundColor: 'transparent',
      chartArea: { left: 64, right: 16, top: 20, bottom: 44, width: '100%', height: '100%' },
      legend: { position: 'none' },
      fontName: '-apple-system, PingFang TC, sans-serif',
      hAxis: { textStyle: { color: muted, fontSize: 11 }, gridlines: { color: 'transparent' } },
      vAxis: { textStyle: { color: muted, fontSize: 11 }, gridlines: { color: grid, count: 5 }, baselineColor: grid, format: 'short' },
      tooltip: { textStyle: { fontSize: 12 } }
    };
  }
  function isReady() { return chartsReady; }

  function registerPage(p) { pages.push(p); }
  function renderActive() {
    var v = VM.activeView();
    for (var i = 0; i < pages.length; i++) if (pages[i].name === v) { if (pages[i].render) pages[i].render(); return; }
  }
  function renderAll() { pages.forEach(function (p) { if (p.render) p.render(); }); }

  // ---------- зӢҖж…Ӣз•«йқў ----------
  function showError(msg) {
    $('loading').classList.add('hidden');
    var el = $('error'); el.classList.remove('hidden'); el.className = 'err';
    el.textContent = 'ијүе…ҘеӨұж•—пјҡ' + msg;
  }
  function showEmpty() {
    $('loading').classList.add('hidden'); $('app').classList.add('hidden');
    if ($('upload')) $('upload').classList.remove('hidden');
    var el = $('error'); el.classList.remove('hidden'); el.className = 'note';
    el.textContent = 'е°ҡз„ЎиіҮж–ҷгҖӮи«Ӣй»һеҸідёҠи§’гҖҢв¬ҶпёҸ дёҠеӮі source.plistгҖҚеҢҜе…ҘдҪ зҡ„иЁҳеёіжӘ”гҖӮ';
  }

  // ијүе…ҘиіҮж–ҷеҲ° Model дёҰе®Ңж•ҙйҮҚз№ӘпјҲеҲқж¬Ўијүе…ҘиҲҮдёҠеӮіеҫҢйҮҚијүе…ұз”Ёпјү
  function loadAndRender(data) {
    M.load(data);
    if (M.isEmpty()) { showEmpty(); return; }
    $('error').classList.add('hidden'); $('loading').classList.add('hidden');
    $('app').classList.remove('hidden');
    if ($('upload')) $('upload').classList.remove('hidden');
    pages.forEach(function (p) { if (p.beforeInit) p.beforeInit(); });   // дҫӢпјҡи¶ЁеӢўй Ғе…Ҳе»әиө·/иҝ„йҒёй …
    VM.init();
    pages.forEach(function (p) { if (p.reload) p.reload(); });           // дҫӢпјҡеҗ„й ҒйҮҚе»әйҒёе–®/й…ҚиүІ
    $('meta').textContent = M.txnCount() + ' зӯҶдәӨжҳ“ В· ' + M.firstMonth() + ' пҪһ ' + M.lastMonth() + ' В· жӣҙж–°ж–ј ' + M.generatedAt();
    renderAll();
  }

  function tryStart() { if (started || !chartsReady || !dataReady) return; started = true; loadAndRender(pendingData); }
  function onData(data) { pendingData = data; dataReady = true; tryStart(); }

  // ---------- дёҠеӮі source.plist ----------
  function setUploadStatus(msg, isErr) {
    var el = $('uploadStatus'); el.textContent = msg;
    el.style.color = isErr ? cssVar('--liab') : cssVar('--muted');
  }
  function wireUpload() {
    var btn = $('uploadBtn'), input = $('plistFile');
    if (!btn || !input) return;
    btn.onclick = function () { input.click(); };
    input.onchange = function () {
      var f = input.files && input.files[0];
      input.value = '';
      if (!f) return;
      setUploadStatus('и®ҖеҸ–гҖҢ' + f.name + 'гҖҚвҖҰ');
      var reader = new FileReader();
      reader.onerror = function () { setUploadStatus('вқҢ и®ҖжӘ”еӨұж•—', true); };
      reader.onload = function () {
        var rows;
        try { rows = App.Importer.plistToRows(reader.result); }
        catch (e) { setUploadStatus('вқҢ и§ЈжһҗеӨұж•—пјҡ' + e.message, true); return; }
        var nT = rows.transactions.length - 1, nA = rows.accounts.length - 1;
        if (!window.google || !google.script || !google.script.run) {
          setUploadStatus('е·Іи§Јжһҗ ' + nT + ' зӯҶдәӨжҳ“гҖҒ' + nA + ' еҖӢеёіжҲ¶пјҲй җиҰҪжЁЎејҸдёҚеҜ«е…ҘпјҢи«Ӣж–ј GAS з¶Ій ҒдҪҝз”Ёпјү');
          return;
        }
        setUploadStatus('е·Іи§Јжһҗ ' + nT + ' зӯҶдәӨжҳ“пјҢеҜ«е…Ҙи©Ұз®—иЎЁдёӯвҖҰ');
        btn.disabled = true;
        google.script.run
          .withSuccessHandler(function (fresh) {
            btn.disabled = false;
            setUploadStatus('вң… еҢҜе…Ҙе®ҢжҲҗпјҡ' + nT + ' зӯҶдәӨжҳ“гҖҒ' + nA + ' еҖӢеёіжҲ¶');
            started = true;
            loadAndRender(fresh);
          })
          .withFailureHandler(function (e) {
            btn.disabled = false;
            setUploadStatus('вқҢ еҜ«е…ҘеӨұж•—пјҡ' + (e && e.message ? e.message : e), true);
          })
          .importData(rows, accessCode);
      };
      reader.readAsText(f);
    };
  }

  // ---------- йҖҡй—ңеҜҶзўј ----------
  function showGate() {
    $('gate').classList.remove('hidden');
    $('loading').classList.add('hidden'); $('app').classList.add('hidden'); $('error').classList.add('hidden');
    setTimeout(function () { var i = $('gateCode'); if (i) i.focus(); }, 50);
  }
  function requestData(code) {
    $('gateErr').style.color = cssVar('--muted');
    $('gateErr').textContent = 'й©—иӯүдёӯвҖҰ';
    google.script.run
      .withSuccessHandler(function (data) {
        accessCode = code;
        try { sessionStorage.setItem('ai_code', code); } catch (e) {}
        $('gate').classList.add('hidden');
        $('loading').classList.remove('hidden');
        onData(data);
      })
      .withFailureHandler(function (e) {
        $('gateErr').style.color = cssVar('--liab');
        $('gateErr').textContent = (e && e.message ? e.message : String(e));
        var i = $('gateCode'); if (i) i.select();
      })
      .getDashboardData(code);
  }
  function wireGate() {
    var btn = $('gateBtn'), input = $('gateCode');
    if (!btn || !input) return;
    function submit() { var c = input.value; if (!c) { $('gateErr').textContent = 'и«Ӣијёе…ҘеҜҶзўј'; return; } requestData(c); }
    btn.onclick = submit;
    input.onkeydown = function (e) { if (e.key === 'Enter') submit(); };
  }

  // ---------- ж ёеҝғдәӢд»¶иҲҮе•ҹеӢ• ----------
  function wireCore() {
    document.querySelectorAll('.tab').forEach(function (t) {
      t.onclick = function () { VM.setActiveView(t.dataset.view); };
    });
    VM.on('activeViewChanged', function (v) {
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.toggle('active', t.dataset.view === v); });
      pages.forEach(function (p) { var el = $('view-' + p.name); if (el) el.classList.toggle('hidden', p.name !== v); });
      renderActive();
    });
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addListener(function () { renderActive(); });
    }
    window.addEventListener('resize', function () { renderActive(); });
    wireUpload();
    wireGate();
  }

  function boot() {
    wireCore();
    pages.forEach(function (p) { if (p.wire) p.wire(); });
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(function () { chartsReady = true; tryStart(); });

    if (window.PRELOADED_DATA) { onData(window.PRELOADED_DATA); return; }   // жң¬ж©ҹй җиҰҪпјҡе…ҚеҜҶзўј
    showGate();
    var saved = '';
    try { saved = sessionStorage.getItem('ai_code') || ''; } catch (e) {}
    if (saved) requestData(saved);
  }

  return {
    $: $, cssVar: cssVar, fmtFull: fmtFull, fmtWan: fmtWan, baseOptions: baseOptions,
    chartsReady: isReady, registerPage: registerPage, renderActive: renderActive, boot: boot
  };
})();
</script>
